<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1920px; height:1080px; overflow:hidden; font-family:Arial,Helvetica,sans-serif;
    background: radial-gradient(1500px 950px at 55% 40%, #1e2547 0%, #12162e 55%, #0a0d1f 100%); }
  svg.routes { position:absolute; inset:0; }
  .city { position:absolute; transform:translate(-50%,-50%); text-align:center; }
  .halo { width:44px; height:44px; border-radius:50%; margin:0 auto;
    box-shadow: 0 0 0 14px rgba(197,165,90,.12), 0 0 70px rgba(197,165,90,.6); background:#C5A55A;
    animation:pulse 3s ease-in-out infinite; }
  @keyframes pulse { 50% { box-shadow: 0 0 0 24px rgba(197,165,90,.07), 0 0 90px rgba(197,165,90,.7);} }
  .halo.small { width:16px; height:16px; opacity:.5; animation:none;
    box-shadow: 0 0 20px rgba(138,144,173,.35); background:#8a90ad; }
  .name { color:#fff; font-size:42px; font-weight:bold; letter-spacing:4px; margin-top:20px; }
  .stat { color:#E3C57B; font-size:26px; font-weight:bold; margin-top:8px; letter-spacing:1px; }
  .note { color:#8a90ad; font-size:20px; margin-top:6px; letter-spacing:2px; }
  .name.dim { color:#6a7090; font-size:22px; letter-spacing:2px; margin-top:12px; }
  .note.dim { font-size:15px; color:#565c7c; margin-top:2px; }
  .goal { position:absolute; left:50%; top:775px; transform:translateX(-50%);
    background:rgba(197,165,90,.1); border:1.5px solid #C5A55A; border-radius:60px;
    padding:22px 54px; color:#E3C57B; font-size:27px; font-weight:bold; letter-spacing:3px; }
  .netlabel { position:absolute; left:50%; top:945px; transform:translateX(-50%);
    color:#565c7c; font-size:16px; letter-spacing:4px; font-weight:bold; }
</style></head><body>
  <svg class="routes" viewBox="0 0 1920 1080">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#C5A55A" stop-opacity=".95"/>
        <stop offset=".5" stop-color="#E3C57B" stop-opacity=".8"/>
        <stop offset="1" stop-color="#C5A55A" stop-opacity=".95"/>
      </linearGradient>
    </defs>
    <path d="M 760 540 Q 1080 440 1400 540" fill="none" stroke="url(#g)" stroke-width="6" stroke-dasharray="3 18" stroke-linecap="round"/>
    <path d="M 1030 955 Q 1155 962 1280 957" fill="none" stroke="rgba(138,144,173,.25)" stroke-width="2.5" stroke-dasharray="2 12" stroke-linecap="round"/>
    <path d="M 1280 957 Q 1405 964 1530 958" fill="none" stroke="rgba(138,144,173,.25)" stroke-width="2.5" stroke-dasharray="2 12" stroke-linecap="round"/>
  </svg>

  <div class="city" style="left:760px; top:540px;">
    <div class="halo"></div><div class="name">OXFORD</div>
    <div class="stat">75 SCREENS · FNB ON 41 VENUES</div>
    <div class="note">THE SQUARE · OLE MISS · HWY 6</div>
  </div>
  <div class="city" style="left:1400px; top:540px;">
    <div class="halo"></div><div class="name">TUPELO</div>
    <div class="stat">25 SCREENS · FNB ON 24 VENUES</div>
    <div class="note">NORTHEAST MISSISSIPPI'S HUB</div>
  </div>

  <div class="goal">THE GOAL: EVERY SCREEN, IN BOTH OF YOUR TOWNS</div>

  <div class="city" style="left:1030px; top:955px;">
    <div class="halo small"></div><div class="name dim">STARKVILLE</div><div class="note dim">MCTV NETWORK</div>
  </div>
  <div class="city" style="left:1280px; top:955px;">
    <div class="halo small"></div><div class="name dim">COLUMBUS</div><div class="note dim">MCTV NETWORK</div>
  </div>
  <div class="city" style="left:1530px; top:955px;">
    <div class="halo small"></div><div class="name dim">WEST POINT</div><div class="note dim">MCTV NETWORK</div>
  </div>
</body></html>
