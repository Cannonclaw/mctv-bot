<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:2000px; height:1500px; background:transparent; }
  #full { position:absolute; top:30px; left:30px; }
  #mark { position:absolute; top:1030px; left:30px; }
</style></head><body>

<svg width="0" height="0">
  <defs>
    <!-- red oak: wide flat canopy, stout trunk, white branch slivers -->
    <g id="gtree">
      <g fill="#C81A2E">
        <!-- canopy: wide cluster -->
        <circle cx="0" cy="-118" r="62"/>
        <circle cx="-72" cy="-98" r="54"/>
        <circle cx="72" cy="-98" r="54"/>
        <circle cx="-132" cy="-62" r="46"/>
        <circle cx="132" cy="-62" r="46"/>
        <circle cx="-160" cy="-14" r="36"/>
        <circle cx="160" cy="-14" r="36"/>
        <circle cx="-36" cy="-150" r="44"/>
        <circle cx="36" cy="-150" r="44"/>
        <circle cx="-100" cy="-130" r="36"/>
        <circle cx="100" cy="-130" r="36"/>
        <circle cx="0" cy="-60" r="92"/>
        <circle cx="-88" cy="-30" r="60"/>
        <circle cx="88" cy="-30" r="60"/>
        <circle cx="-30" cy="0" r="46"/>
        <circle cx="30" cy="0" r="46"/>
        <!-- trunk -->
        <path d="M-20 -20 h40 l6 118 c16 -18 36 -28 62 -32 l-10 20 c-24 6 -38 16 -52 34 l2 60 h-56 l2 -58
                 c-14 -20 -28 -30 -52 -36 l-10 -20 c26 4 46 14 62 32 Z"/>
      </g>
      <!-- white branch slivers radiating from trunk top -->
      <g fill="#FFFFFF">
        <path d="M-6 -40 L-44 -84 L-35 -91 L0 -48 Z"/>
        <path d="M6 -40 L46 -82 L38 -90 L0 -48 Z"/>
        <path d="M-1 -52 L-4 -104 L6 -104 L5 -52 Z"/>
        <path d="M-14 -42 L-72 -62 L-68 -72 L-10 -50 Z"/>
        <path d="M14 -42 L72 -60 L67 -71 L10 -50 Z"/>
        <ellipse cx="-52" cy="-134" rx="13" ry="5" transform="rotate(-38 -52 -134)"/>
        <ellipse cx="54" cy="-131" rx="13" ry="5" transform="rotate(35 54 -131)"/>
      </g>
    </g>

    <!-- swoosh ring: full circle, layered rim, two diagonal breaks -->
    <g id="gring">
      <circle cx="0" cy="0" r="260" fill="none" stroke="#1D6FA5" stroke-width="88"/>
      <circle cx="0" cy="0" r="260" fill="none" stroke="#FFFFFF" stroke-width="72"/>
      <circle cx="0" cy="0" r="260" fill="none" stroke="#16294F" stroke-width="54"/>
      <!-- diagonal cut upper-left and lower-right (swoosh breaks) -->
      <g stroke="#FFFFFF" stroke-width="14">
        <line x1="-330" y1="-135" x2="-160" y2="-245"/>
        <line x1="160" y1="245" x2="330" y2="135"/>
      </g>
    </g>
  </defs>
</svg>

<!-- Full wordmark -->
<svg id="full" width="1920" height="940" viewBox="0 0 1920 940">
  <g font-family="'Arial Black', Arial" font-weight="900" font-size="340">
    <text x="40" y="590" fill="none" stroke="#1D6FA5" stroke-width="36" stroke-linejoin="round">GR</text>
    <text x="40" y="590" fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linejoin="round">GR</text>
    <text x="40" y="590" fill="#16294F">GR</text>
    <text x="1330" y="590" fill="none" stroke="#1D6FA5" stroke-width="36" stroke-linejoin="round">VE</text>
    <text x="1330" y="590" fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linejoin="round">VE</text>
    <text x="1330" y="590" fill="#16294F">VE</text>
  </g>
  <use href="#gring" transform="translate(985 460)"/>
  <use href="#gtree" transform="translate(985 500) scale(1.12)"/>
</svg>

<!-- Compact mark -->
<svg id="mark" width="380" height="380" viewBox="-190 -190 380 380">
  <use href="#gring" transform="scale(0.62)"/>
  <use href="#gtree" transform="translate(0 22) scale(0.66)"/>
</svg>

</body></html>
