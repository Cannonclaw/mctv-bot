# MCTV-Bot Render Blueprint
# Docs: https://docs.render.com/blueprint-spec
#
# Deploys the Streamlit web app + 12 scheduled cron jobs.
# All services share the same Dockerfile and env var group.

services:
  # ── Web App ───────────────────────────────────────────────────────────────
  - type: web
    name: mctv-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: ohio
    branch: main
    healthCheckPath: /
    envVarGroups:
      - mctv-bot-env
    headers:
      - path: /app/static/service-worker.js
        name: Service-Worker-Allowed
        value: /

  # ── Cron: Daily Briefing ──────────────────────────────────────────────────
  # 7:00 AM CT (Mon-Fri) = 13:00 UTC (CST) / 12:00 UTC (CDT)
  # Using 13:00 UTC to be safe for CST
  - type: cron
    name: mctv-daily-briefing
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 13 * * 1-5"
    dockerCommand: python scripts/daily_briefing.py
    region: ohio
    branch: main
    envVarGroups:
      - mctv-bot-env

  # ── Cron: Contract Expiration Alerts ──────────────────────────────────────
  # 7:15 AM CT (Mon-Fri) = 13:15 UTC
  - type: cron
    name: mctv-contract-alerts
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "15 13 * * 1-5"
    dockerCommand: python scripts/contract_alerts.py
    region: ohio
    branch: main
    envVarGroups:
      - mctv-bot-env

  # ── Cron: Lead Follow-up Automation ───────────────────────────────────────
  # 8:00 AM CT (Daily) = 14:00 UTC
  - type: cron
    name: mctv-lead-followups
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 14 * * *"
    dockerCommand: python scripts/lead_followups.py
    region: ohio
    branch: main
    envVarGroups:
      - mctv-bot-env

  # ── Cron: Monthly Traction Reports ────────────────────────────────────────
  # 9:00 AM CT on the 1st of each month = 15:00 UTC
  - type: cron
    name: mctv-monthly-reports
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 15 1 * *"
    dockerCommand: python scripts/monthly_reports.py
    region: ohio
    branch: main
    envVarGroups:
      - mctv-bot-env

  # ── Cron: Weekly Advertiser Pulse ─────────────────────────────────────────
  # 8:30 AM CT every Monday = 14:30 UTC
  - type: cron
    name: mctv-weekly-pulse
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "30 14 * * 1"
    dockerCommand: python scripts/weekly_advertiser_pulse.py
    region: ohio
    branch: main
    envVarGroups:
      - mctv-bot-env

  # ── Cron: Daily Briefing Push (Slack/SMS) ─────────────────────────────────
  # 7:30 AM CT (Mon-Fri) = 13:30 UTC
  - type: cron
    name: mctv-briefing-push
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "30 13 * * 1-5"
    dockerCommand: python scripts/push_briefing.py
    region: ohio
    branch: main
    envVarGroups:
      - mctv-bot-env

  # ── Cron: QuickBooks Reconciliation ───────────────────────────────────────
  # 7:00 AM CT every day = 13:00 UTC (runs 1h after main daily briefing)
  - type: cron
    name: mctv-qbo-reconcile
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 14 * * *"
    dockerCommand: python scripts/qbo_reconcile.py
    region: ohio
    branch: main
    envVarGroups:
      - mctv-bot-env

  # ── Cron: NPS Survey Sender ───────────────────────────────────────────────
  # 9:00 AM CT every day = 15:00 UTC
  - type: cron
    name: mctv-nps-send
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 15 * * *"
    dockerCommand: python scripts/nps_send.py
    region: ohio
    branch: main
    envVarGroups:
      - mctv-bot-env

  # ── Cron: Win-back Campaign ───────────────────────────────────────────────
  # 9:30 AM CT Tue/Thu = 15:30 UTC
  - type: cron
    name: mctv-winback
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "30 15 * * 2,4"
    dockerCommand: python scripts/win_back_lost_leads.py
    region: ohio
    branch: main
    envVarGroups:
      - mctv-bot-env

  # ── Cron: Weekly Per-Rep Recap ────────────────────────────────────────────
  # 8:00 AM CT every Monday = 14:00 UTC
  - type: cron
    name: mctv-rep-recap
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 14 * * 1"
    dockerCommand: python scripts/weekly_rep_recap.py
    region: ohio
    branch: main
    envVarGroups:
      - mctv-bot-env

  # ── Cron: Smart Upsell Triggers ───────────────────────────────────────────
  # 9:00 AM CT every Wednesday = 15:00 UTC
  - type: cron
    name: mctv-upsell-triggers
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 15 * * 3"
    dockerCommand: python scripts/upsell_triggers.py
    region: ohio
    branch: main
    envVarGroups:
      - mctv-bot-env

  # ── Cron: Stalled Deal Alerts ─────────────────────────────────────────────
  # 7:45 AM CT (Mon-Fri) = 13:45 UTC
  - type: cron
    name: mctv-stalled-alerts
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "45 13 * * 1-5"
    dockerCommand: python scripts/stalled_deal_alerts.py
    region: ohio
    branch: main
    envVarGroups:
      - mctv-bot-env
