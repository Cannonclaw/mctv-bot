[theme]
primaryColor = "#C5A55A"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F5F5"
textColor = "#1B1F3B"
font = "sans serif"

[server]
headless = true
enableStaticServing = true
enableXsrfProtection = false
enableCORS = false

[browser]
gatherUsageStats = false

[client]
# Hide Streamlit's alphabetized auto page nav. We render our own grouped,
# branded sidebar via services.team_ui.render_team_sidebar() instead.
showSidebarNavigation = false
